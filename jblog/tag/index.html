---
layout: default
---

<div class="well">

    <header id="post-header">
        <h3 id="post-title">All tags</h3>
    </header>

    <div id="post-content">

        {% for tag in site.data.tags %}
            
            {% if forloop.first %}
                <div class="list-group">
            {% endif %}
            
            <a href="{{ site.baseurl}}/jblog/tag/{{ tag.slug }}/" class="list-group-item">
                <h5 class="list-group-item-heading">{{ tag.name }}</h5>
            </a>

            {% if forloop.last %}
                </div>
            {% endif %}

        {% endfor %}
    
    </div>

</div>
