---
layout: default
---

<div class="well">

    <header id="post-header">
        <h3 id="post-title">Projects in Github</h3>
    </header>

    <div id="post-content">
        <div class="list-group">

            <a href="{{ site.baseurl}}/jblog/tag/{{ tag.slug }}/" class="list-group-item">
                <h5 class="list-group-item-heading">{{ tag.name }}</h5>
            </a>

        </div>
    </div>

</div>

<script type="text/javascript" src="{{ site.baseurl }}/js/fetch-projects.js"></script>
