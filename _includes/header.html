<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ site.name }}</title>

    <noscript>Not seeing a <a href="http://www.scrolltotop.com/">Scroll to Top Button</a>? Go to our FAQ page for more
        info.
    </noscript>

    <link href="{{ site.baseurl }}/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ site.baseurl }}/assets/css/theme.css" rel="stylesheet">
    <link href="{{ site.baseurl }}/assets/css/syntax.css" rel="stylesheet">
    <link href='{{ site.baseurl }}/favicon.ico' rel='shortcut icon' type='image/x-icon'>
    <link href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" rel="stylesheet">
    <link href='//fonts.googleapis.com/css?family=Domine:700|Open+Sans:400,600|Source+Code+Pro:500' rel='stylesheet' type='text/css'>
    
    <script type="text/javascript" src="{{ site.baseurl }}/assets/js/jquery.min.js"></script>
    <script type="text/javascript" src="{{ site.baseurl }}/assets/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="{{ site.baseurl }}/assets/js/d3.min.js"></script>
    <script type="text/javascript" src="{{ site.baseurl }}/assets/js/jblog.js"></script>
    <script type="text/javascript" src="http://arrow.scrolltotop.com/arrow88.js"></script>

</head>

<body>

<div class="container-fluid">
    <div class="row-fluid">
        <div class="navbar navbar-inverse navbar-fixed-top" role="navigation">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse"
                        data-target="#bs-example-navbar-collapse-1">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
                <ul class="nav navbar-nav" id="headerButtons">
                    <li class="active"><a href="{{ site.baseurl }}/">Home</a></li>
                    <li class="active"><a href="{{ site.baseurl }}/jblog/">Articles</a></li>
                    <li class="active">
                        <a href="{{ site.baseurl }}/jblog/category/">Categories</a>
                        <ul class="dropdown-menu">
                            {% for category in site.data.categories %}
                            <li>
                                <a href="{{ site.baseurl}}/jblog/category/{{ category.slug }}/">{{ category.name }}</a>
                            </li>
                            {% endfor %}
                        </ul>
                    </li>
                    <li class="active">
                        <a href="{{ site.baseurl }}/jblog/tag/">Tags</a>
                        <ul class="dropdown-menu">
                            {% for tag in site.data.tags %}
                            <li>
                                <a href="{{ site.baseurl}}/jblog/tag/{{ tag.slug }}/">{{ tag.name }}</a>
                            </li>
                            {% endfor %}
                        </ul>
                    </li>
                    <li class="active"><a href="{{ site.baseurl }}/jblog/projects/">Code</a></li>
                    <li class="active"><a href="{{ site.baseurl }}/feed.xml" target="blank"><i
                            class="fa fa-rss"></i></a></li>
                    <li class="active"><a href="https://github.com/damianfanaro" target="blank"><i
                            class="fa fa-github"></i></a></li>
                    <li class="active"><a href="https://www.linkedin.com/in/damianfanaro" target="blank"><i
                            class="fa fa-linkedin"></i></a></li>
                    <li class="active"><a href="https://twitter.com/DamianFanaro" target="blank"><i
                            class="fa fa-twitter"></i></a></li>
                </ul>
            </div>
        </div>
    </div>
</div>
